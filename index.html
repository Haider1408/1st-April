<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sheza 💖</title>

<style>
body {
    margin: 0;
    font-family: "Georgia", serif;
}

/* COVER */
.cover {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('cover.png') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 80px;
}

/* Open button */
.open-btn {
    padding: 14px 30px;
    font-size: 18px;
    background: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

/* MAIN */
.main {
    display: none;
    background: linear-gradient(to bottom, #ffd6e7, #fff0f5);
    height: 100vh;
    justify-content: center;
    align-items: center;
}

/* Letter */
.page {
    width: 700px;
    max-width: 90%;
    background: white;
    padding: 40px;
    border-radius: 20px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 6px solid pink;
}

/* Flowers */
.corner {
    position: absolute;
    font-size: 28px;
}
.top-left { top: 10px; left: 10px; }
.top-right { top: 10px; right: 10px; }
.bottom-left { bottom: 10px; left: 10px; }
.bottom-right { bottom: 10px; right: 10px; }

/* Text */
h1 {
    text-align: center;
    color: #d63384;
}

p {
    font-size: 18px;
    line-height: 1.7;
    text-align: center;
}

/* YES button */
.yes-btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: hotpink;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

/* Hearts animation */
.heart {
    position: fixed;
    color: pink;
    font-size: 20px;
    animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-200px); opacity:0; }
}
</style>

<script>
function openBook() {
    document.querySelector(".cover").style.display = "none";
    document.querySelector(".main").style.display = "flex";
    document.getElementById("music").play();
}

function showLove() {
    for(let i=0;i<20;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.top = "80vh";
        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),2000);
    }
}
</script>

</head>

<body>

<!-- 💐 COVER IMAGE -->
<div class="cover">
    <button class="open-btn" onclick="openBook()">Open 💕</button>
</div>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- 💖 LETTER -->
<div class="main">
<div class="page">

<div class="corner top-left">🌸</div>
<div class="corner top-right">🌸</div>
<div class="corner bottom-left">🌸</div>
<div class="corner bottom-right">🌸</div>

<h1>Dear Sheza 💖</h1>

<p>Your heart was my first... (keep your full text here exactly as before)</p>

<p style="font-size:22px; color:#d63384; font-weight:bold;">
Will you make me the happiest man alive and be my girlfriend? 💖
</p>

<button class="yes-btn" onclick="showLove()">YES 💕</button>

</div>
</div>

</body>
</html>
